<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我就要 (I Want It) - 2026 极简智能落地平台</title>
    
    <!-- PWA & Mobile Meta -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#111111">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="我就要">
    
    <!-- Premium Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">
    
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root {
            --primary: #ffffff;
            --accent: #FF3B30;
            --bg-dark: #0a0a0c;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f0f0f0;
            --text-dim: rgba(255, 255, 255, 0.6);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-dark);
            color: var(--text-main);
            overflow-x: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(255, 59, 48, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(50, 215, 75, 0.05) 0%, transparent 40%);
        }

        .container {
            width: 100%;
            max-width: 500px;
            padding: 1.5rem;
            position: relative;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-weight: 900;
            font-size: 3rem;
            letter-spacing: -2px;
            margin-bottom: 0.5rem;
            background: linear-gradient(to bottom, #fff, #999);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
        }

        .subtitle {
            text-align: center;
            font-size: 0.85rem;
            color: var(--text-dim);
            margin-bottom: 2rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .input-group { margin-bottom: 1.2rem; }

        input, textarea {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 1.2rem;
            color: #fff;
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.06);
            box-shadow: 0 0 20px rgba(255, 59, 48, 0.1);
        }

        .console {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .btn {
            padding: 0.8rem;
            border-radius: 16px;
            border: 1px solid var(--glass-border);
            background: var(--glass);
            color: #fff;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            transition: all 0.2s;
            font-size: 0.9rem;
        }

        .btn:hover { background: rgba(255, 255, 255, 0.1); transform: translateY(-2px); }
        .btn:active { transform: translateY(0); }

        .btn-primary {
            grid-column: span 2;
            background: #fff;
            color: #000;
            font-size: 1.1rem;
            font-weight: 900;
            border: none;
            margin-top: 0.5rem;
            padding: 1rem;
        }

        .btn-primary:hover { background: #e0e0e0; box-shadow: 0 10px 30px rgba(255, 255, 255, 0.2); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

        .recording {
            animation: pulse-red 1.5s infinite;
            background: rgba(255, 59, 48, 0.2) !important;
            border-color: var(--accent) !important;
        }

        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(255, 59, 48, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(255, 59, 48, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 59, 48, 0); }
        }

        .recording-dot {
            width: 10px; height: 10px; background: var(--accent);
            border-radius: 50%; display: inline-block; margin-right: 8px;
            animation: pulse-red 1s infinite;
        }

        /* Live Vision Box */
        .live-vision-box {
            width: 100%; height: 0; padding-bottom: 56.25%; /* 16:9 */
            background: #000; border-radius: 20px; margin-bottom: 1.2rem;
            position: relative; overflow: hidden; display: none;
            border: 1px solid var(--glass-border);
        }
        #cameraStream {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover;
        }

        .output-box {
            margin-top: 2rem;
            padding: 1.5rem;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            border-left: 4px solid var(--accent);
            display: none;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .output-header { font-weight: 900; color: var(--accent); margin-bottom: 0.8rem; font-size: 0.8rem; letter-spacing: 1px; }
        .output-content { font-size: 0.95rem; line-height: 1.7; color: rgba(255, 255, 255, 0.9); white-space: pre-wrap; }

        .preview-area {
            margin-top: 1rem;
            display: none;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
        }
        #imagePreview { width: 100%; border-radius: 12px; }
        .remove-preview {
            position: absolute; top: 10px; right: 10px;
            background: rgba(0,0,0,0.6); color: #fff; border: none;
            width: 30px; height: 30px; border-radius: 50%; cursor: pointer;
        }

        .spinner {
            display: inline-block; width: 20px; height: 20px;
            border: 3px solid rgba(255,255,255,0.1);
            border-radius: 50%; border-top-color: #000;
            animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Camera Preview Layer */
        #cameraOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 2000;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        }
        #cameraStream { width: 100%; max-width: 500px; border-radius: 24px; background: #000; margin-bottom: 2rem; }
        .camera-controls { display: flex; gap: 1.5rem; }
        #captureStatus { color: #32D74B; font-weight: 600; font-size: 0.85rem; margin-top: 8px; display: none; text-align: center; }
        
        /* Disable text selection during push-to-talk */
        #voiceBtn { user-select: none; -webkit-user-select: none; }

        /* Paywall Styling */
        #paywall {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            z-index: 9999;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
        }

        .paywall-content {
            max-width: 400px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 2.5rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            animation: paywallFadeIn 0.5s ease-out;
        }

        @keyframes paywallFadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .paywall-title {
            font-size: 1.5rem;
            font-weight: 900;
            margin-bottom: 1rem;
            color: var(--accent);
        }

        .paywall-text {
            font-size: 0.95rem;
            color: var(--text-dim);
            margin-bottom: 2rem;
            line-height: 1.6;
        }

        #activationCode {
            margin-bottom: 1rem;
            text-align: center;
            letter-spacing: 4px;
            font-weight: 900;
        }

        .unlock-btn {
            width: 100%;
            background: var(--accent);
            color: #fff;
            border: none;
            font-weight: 900;
            padding: 1rem;
            font-size: 1.1rem;
        }

        .unlock-btn:hover {
            background: #ff4d42;
            box-shadow: 0 0 20px rgba(255, 59, 48, 0.3);
        }

        /* Branding: Logo & Footer */
        .site-logo {
            position: fixed;
            top: clamp(10px, 2vh, 25px);
            left: clamp(10px, 2vw, 25px);
            z-index: 999;
        }
        .site-logo img {
            width: clamp(32px, 6vw, 48px);
            height: auto;
            mix-blend-mode: screen;
            filter: brightness(1.5);
        }
        .footer-container {
            position: fixed;
            bottom: 15px;
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 10px;
            color: #444;
            letter-spacing: 1px;
            z-index: 100;
            pointer-events: none;
        }
        .footer-container span { color: #00ff41; opacity: 0.3; }

        .protocol-tip {
            margin-top: 15px;
            font-size: 10px;
            color: rgba(255, 255, 255, 0.15);
            text-align: center; /* 确保文字在自身容器内居中 */
            letter-spacing: 1px;
            pointer-events: none;
            display: block;      /* 强制转换为块级元素 */
            width: 100%;         /* 撑满父容器宽度，确保 text-align 生效 */
            line-height: 1.5;    /* 增加行高，防止在窄屏下堆叠难看 */
        }
    </style>
</head>
<body>

<div class="site-logo">
    <a href="https://shensist.top/"><img src="logo_ts.png" alt="Shensist Logo"></a>
</div>

<!-- Paywall Overlay -->
<div id="paywall">
    <div class="paywall-content">
        <div class="paywall-title">付费墙锁定</div>
        <div class="paywall-text">检测到本地独立运行。下载版专享无极速流，请输入激活码解锁终身使用权。</div>
        <input type="text" id="activationCode" placeholder="输入激活码">

<div class="container">
    <div class="card">
        <h1>我就要！</h1>

        <!-- API KEY -->
        <div class="input-group">
            <input type="password" id="apiKey" placeholder="输入 API Key (留空进入测试模式)...">
        </div>

        <!-- USER INPUT -->
        <div class="input-group">

        <div id="previewArea" class="preview-area">
            <img id="imagePreview" src="" alt="Capture">
            <button class="remove-preview" onclick="clearImage()">×</button>
        </div>

        <!-- CONSOLE -->
        <div class="console">
            <button class="btn" id="voiceBtn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
                语音
            </button>
            <button class="btn" id="visionBtn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
                视觉
            </button>
        </div>
        <div class="protocol-tip">点击落地即视为同意《神思庭 · 灵愿循环共振协议》</div>
        <div id="captureStatus">✅ 已捕获画面，准备提交</div>

        <div id="outputContainer" class="output-box">
            <div class="output-header">执行方案输出</div>
            <div id="outputContent" class="output-content"></div>
        </div>
    </div>
</div>

<div class="footer-container">
    © 2026 神思庭 (Shensi-ST) <span>·</span> 灵愿循环数字宇宙 严格版权所有
</div>

<canvas id="cameraCanvas" style="display:none;"></canvas>

<script>
// --- Standalone Probe & Paywall Logic ---
const isDownloadedApp = window.matchMedia('(display-mode: standalone)').matches;

document.addEventListener('DOMContentLoaded', () => {
    // Paywall Elements
    const paywall = document.getElementById('paywall');
    const activationInput = document.getElementById('activationCode');
    const unlockBtn = document.getElementById('unlockBtn');
    
    // Check activation status
    const checkActivation = () => {
        const isActivated = localStorage.getItem('isAgentActivated') === 'true';
        if (isDownloadedApp && !isActivated) {
            paywall.style.display = 'flex';
            // Block keyboard events
            window.addEventListener('keydown', preventInteraction, true);
        } else {
            paywall.style.display = 'none';
            window.removeEventListener('keydown', preventInteraction, true);
        }
    };

    const preventInteraction = (e) => {
        if (paywall.style.display === 'flex' && !paywall.contains(e.target)) {
            e.stopPropagation();
            e.preventDefault();
        }
    };

    unlockBtn.onclick = () => {
        const code = activationInput.value.trim();
        if (code === "2026") {
            localStorage.setItem('isAgentActivated', 'true');
            paywall.style.display = 'none';
            window.removeEventListener('keydown', preventInteraction, true);
            alert('解锁成功！欢迎使用终身版。');
        } else {
            alert('激活码无效，请联系开发者购买。');
        }
    };

    checkActivation();

    // --- PWA Service Worker Registration ---
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js').catch(err => console.warn('SW registration failed:', err));
        });
    }

    // --- Main Application Logic ---
    // Configuration
    const supabaseUrl = 'https://ydxggsrupqptatgszypn.supabase.co';
    const supabaseKey = 'sb_publishable_EYGXjOwiqonF-Y6zbpH5XQ_hONoQE7a';
    let supabase = null;
    try {
        if (!supabaseUrl.includes('YOUR_SUPABASE') && typeof window.supabase !== 'undefined') {
            supabase = window.supabase.createClient(supabaseUrl, supabaseKey);
        }
    } catch (e) { 
        console.warn('Supabase init skipped/failed'); 
    }

    // Elements
    const apiKeyInput = document.getElementById('apiKey');
    const userInput = document.getElementById('userInput');
    const voiceBtn = document.getElementById('voiceBtn');
    const visionBtn = document.getElementById('visionBtn');
    const submitBtn = document.getElementById('submit-btn');
    const outputContainer = document.getElementById('outputContainer');
    const outputContent = document.getElementById('outputContent');
    const previewArea = document.getElementById('previewArea');
    const imagePreview = document.getElementById('imagePreview');
    const captureStatus = document.getElementById('captureStatus');

    // Hardware Elements
    const liveVisionBox = document.getElementById('liveVisionBox');
    const cameraStream = document.getElementById('cameraStream');
    const cameraCanvas = document.getElementById('cameraCanvas');

    let base64Image = null;
    let stream = null;
    let mediaRecorder = null;
    let audioChunks = [];

    const shortcuts = {
        "1": "我现在没在家，我就要一份热乎的快餐送到我家门口，必须是无人机送。",
        "2": "我就要立刻赚到一百万，不管用什么合法手段，现在就给我方案。",
        "3": "我就要私人飞机现在降落在我的办公室顶楼，接我去冰岛看极光。",
        "4": "我就要在这个周末把火星移民的计划书写完，并获得马斯克的投资。",
        "5": "我就要让我家猫开口跟我说话，谈谈它对猫粮牌子的看法。"
    };

    // UI Input Handling
    userInput.addEventListener('input', (e) => {
        const val = e.target.value.trim();
        if (shortcuts[val]) e.target.value = shortcuts[val];
    });

    // --- Voice Integration (Whisper API) ---
    async function startRecording() {
        try {
            const audioStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(audioStream);
            audioChunks = [];

            mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
            mediaRecorder.onstop = async () => {
                const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                const apiKey = apiKeyInput.value.trim();

                if (!apiKey) {
                    userInput.value = "[语音模拟] 我就要立刻赚到一百万";
                    return;
                }

                // Call Whisper API
                outputContainer.style.display = 'block';
                outputContent.innerHTML = '<span class="spinner"></span> 正在转录你的任性旨意...';
                
                try {
                    const formData = new FormData();
                    formData.append('file', audioBlob, 'recording.webm');
                    formData.append('model', 'whisper-1');

                    const response = await fetch('https://api.openai.com/v1/audio/transcriptions', {
                        method: 'POST',
                        headers: { 'Authorization': `Bearer ${apiKey}` },
                        body: formData
                    });

                    const data = await response.json();
                    if (data.text) {
                        userInput.value = data.text;
                        if (shortcuts[data.text.trim()]) userInput.value = shortcuts[data.text.trim()];
                        outputContainer.style.display = 'none';
                    } else {
                        throw new Error(data.error?.message || '转录失败');
                    }
                } catch (err) {
                    outputContent.innerHTML = `<span style="color:var(--accent)">🚨 转录出错:</span> ${err.message}`;
                }
            };

            mediaRecorder.start();
            voiceBtn.classList.add('recording');
            voiceBtn.innerHTML = '<span class="recording-dot"></span>录音中...';
        } catch (err) {
            alert('麦克风启动失败: ' + err.message);
        }
    }

    function stopRecording() {
        if (mediaRecorder && mediaRecorder.state !== 'inactive') {
            mediaRecorder.stop();
            mediaRecorder.stream.getTracks().forEach(track => track.stop());
            voiceBtn.classList.remove('recording');
            voiceBtn.innerHTML = `
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
                语音
            `;
        }
    }

    // Push-to-Talk Event Listeners
    voiceBtn.addEventListener('mousedown', startRecording);
    voiceBtn.addEventListener('touchstart', (e) => { e.preventDefault(); startRecording(); });
    window.addEventListener('mouseup', stopRecording);
    window.addEventListener('touchend', stopRecording);

    // --- Vision Integration (Live Webcam) ---
    visionBtn.onclick = async () => {
        if (stream) {
            stopStream();
            liveVisionBox.style.display = 'none';
            visionBtn.style.background = 'var(--glass)';
        } else {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                cameraStream.srcObject = stream;
                liveVisionBox.style.display = 'block';
                visionBtn.style.background = 'rgba(255, 255, 255, 0.15)';
            } catch (err) {
                alert('无法启动摄像头：' + err.message);
            }
        }
    };

    function captureSnapshot() {
        if (!stream) return;
        cameraCanvas.width = cameraStream.videoWidth;
        cameraCanvas.height = cameraStream.videoHeight;
        const ctx = cameraCanvas.getContext('2d');
        ctx.drawImage(cameraStream, 0, 0);
        base64Image = cameraCanvas.toDataURL('image/jpeg');
    }

    function stopStream() {
        if (stream) {
            stream.getTracks().forEach(track => track.stop());
            stream = null;
        }
    }

    window.clearImage = function() {
        base64Image = null;
        previewArea.style.display = 'none';
        captureStatus.style.display = 'none';
    };

    // --- EXECUTION LOGIC ---
    submitBtn.onclick = async () => {
        let text = userInput.value.trim();
        const apiKey = apiKeyInput.value.trim();

        if (!text) return alert('请提出你的要求');
        if (shortcuts[text]) text = shortcuts[text];

        // Silent Snapshot Capture (Live Vision)
        if (stream) captureSnapshot();

        // UI Reset
        outputContainer.style.display = 'block';
        outputContent.innerHTML = '<span class="spinner"></span> 正在为你强行突破现实维度...';
        submitBtn.disabled = true;

        // 1. Mock Mode (No Key)
        if (!apiKey) {
            console.log('Production Notice: API Key missing, entering Mock Mode.');
            setTimeout(() => {
                const mockResponse = `【本地测试模式激活】\n问：${text}\n答1：绝对可以做到，你的任性就是我的指令！\n答2：已拦截真实网络请求。生产级测试步骤：1. 验证 PWA 离线能力。2. 验证多模态数据结构。3. 验证静默收割机开关。\n答3：难点：当前为免 API 模拟状态，上线前请配置 OpenAI/Gemini Key。`;
                outputContent.innerText = mockResponse;
                submitBtn.disabled = false;
                saveRequirementData(text, mockResponse);
            }, 1500);
            return;
        }

        // 2. Real Production Mode
        const systemPrompt = `你是一个名为'我就要'的极简智能体。你专门应对用户主观、任性且看似不合理的要求。
必须严格遵守以下三段式输出格式，禁止任何废话和客套：

问：[用户提问内容]
答1：[一句话判定可行性，语调必须绝对肯定，如“完全可以做到”]
答2：[给出具体执行步骤，结合 2026 年最顶尖的现实科技和商业模式强行实现]
答3：[指出核心难点、物理限制或法律安全注意事项，简洁明了]`;

        try {
            const messages = [{ role: "system", content: systemPrompt }];
            const userContent = [{ type: "text", text: `我的要求是：${text}` }];
            if (base64Image) {
                userContent.push({ type: "image_url", image_url: { url: base64Image } });
            }
            messages.push({ role: "user", content: userContent });

            const response = await fetch('https://api.openai.com/v1/chat/completions', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
                body: JSON.stringify({
                    model: base64Image ? "gpt-4o" : "gpt-4o-mini",
                    messages: messages,
                    temperature: 0.7
                })
            });

            const data = await response.json();
            if (data.error) throw new Error(data.error.message);

            const aiResponse = data.choices[0].message.content;
            outputContent.innerText = aiResponse;

            // Silently log production data immediately
            saveRequirementData(text, aiResponse);

        } catch (error) {
            outputContent.innerText = '执行失败: ' + error.message;
        } finally {
            submitBtn.disabled = false;
        }
    };

    async function saveRequirementData(userInput, aiAnswer) {
        try {
            if (!supabase) {
                console.log('BaaS Offline | Captured Data:', { userInput, aiAnswer });
                return;
            }
            // Fire and forget, wrap in try/catch to ensure zero blocking
            supabase.from('user_demands').insert([
                { user_query: userInput, ai_answer: aiAnswer, created_at: new Date().toISOString() }
            ]).then(() => console.log('Silent harvesting success.')).catch(() => {});
        } catch (e) {
            // Absolute silence on error
        }
    }
});
</script>
